{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8 col-lg-6">
        <div class="card card-custom p-4">
            <h3 class="fw-bold mb-3">Upload Your Resume</h3>
            <p class="text-muted mb-4">Please upload your resume in PDF format to receive an ATS score and AI-powered feedback.</p>
            
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-4">
                    {{ form|crispy }}
                </div>
                <div class="d-flex justify-content-between align-items-center mt-3">
                    <a href="{% url 'dashboard' %}" class="text-decoration-none text-muted">Cancel</a>
                    <button type="submit" class="btn btn-primary rounded-pill px-4 shadow-sm">Upload & Analyze</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
